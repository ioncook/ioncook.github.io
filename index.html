<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="description"
    content="Ion Cook's personal portfolio of web projects including route planners, schedulers, games, and utilities.">
  <title>Ion Cook</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

  <div id="container">

    <div id="header">
      <h1>Ion Cook</h1>
    </div>

    <div id="banner">
      <!-- Blank color bar matching the aesthetic -->
    </div>

    <div id="content">
      <div class="welcome-container">
        <img src="picture.jpg" class="welcome-pic" alt="Profile picture">
        <p>Welcome to my home page. Here, you can find links to my projects and the source code. I might add more
          in the future.</p>
      </div>

      <div class="section-header">
        <h2>Global Settings</h2>
      </div>

      <div class="settings-container">
        <div class="setting-item">
          <span class="setting-label">Unit System</span>
          <div class="setting-options">
            <button id="unit-metric" class="setting-btn active">Metric</button>
            <button id="unit-imperial" class="setting-btn">Imperial</button>
          </div>
        </div>
        <div class="setting-item">
          <span class="setting-label">Theme Mode</span>
          <div class="setting-options">
            <button id="theme-light" class="setting-btn active">Light</button>
            <button id="theme-dark" class="setting-btn">Dark</button>
          </div>
        </div>
      </div>

      <table width="100%" border="0" cellspacing="0" cellpadding="0" id="projects-table">
        <!-- Projects will be dynamically populated here in retro table rows -->
      </table>
    </div>

    <div id="footer">

      <p>&copy; Copyright 2026 Ion Cook. All Rights Reserved.</p>
      <p style="font-size: 8pt; margin-top: 5px;">Site format inspired by classic 2010s layouts.</p>
      <p style="font-size: 8pt; margin-top: 5px;">Contact at ionraycook@gmail.com</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
